<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 250px;
      font-family: Arial, sans-serif;
      padding: 10px;
      margin: 0;
    }
    h3 { margin-top: 0; font-size: 14px; }
    button {
      width: 100%;
      padding: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      background-color: #007bff;
      color: white;
      font-weight: bold;
    }
    button.remove { background-color: #dc3545; }
    .status { font-size: 12px; color: #555; word-break: break-all; }
  </style>
</head>
<body>
  <h3>JS Blocker 設定</h3>
  <button id="block-btn">このサイトでJSを無効化</button>
  <button id="allow-btn" class="remove">無効化を解除</button>
  <div class="status" id="status-text">URLを取得中...</div>

  <script src="popup.js"></script>
</body>
</html>
